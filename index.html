<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.4';
import Chart from 'https://esm.sh/chart.js@4.4.6/auto';
// Chart.js v4 ships without a date adapter; this registers date-fns for the time scale.
import 'https://esm.sh/chartjs-adapter-date-fns@3.0.0?deps=chart.js@4.4.6';

// ----- Config -----
const CONFIG = {
  supabaseUrl: 'https://vwejipgsculrwustpooe.supabase.co',
  supabaseAnonKey: 'sb_publishable_EeD2Lxd2PLkGfRu-AQWuhA_yhPi0WCE',
  barWeightLbs: 45,
  availablePlates: [45, 25, 10, 5, 2.5],
};

// Main lifts shown in the progression chart grid, in standard StrongLifts order.
const MAIN_LIFTS = ['Squat', 'Bench Press', 'Barbell Row', 'Overhead Press', 'Deadlift'];
const MAIN_LIFT_ALIASES = {
  'Squat': ['Squat', 'Back Squat', 'Barbell Squat'],
  'Bench Press': ['Bench Press', 'Bench'],
  'Barbell Row': ['Barbell Row', 'Pendlay Row', 'Row'],
  'Overhead Press': ['Overhead Press', 'OHP', 'Press', 'Standing Press'],
  'Deadlift': ['Deadlift', 'Conventional Deadlift'],
};

// ----- Supabase -----
const supa = createClient(CONFIG.supabaseUrl, CONFIG.supabaseAnonKey, {
  auth: { persistSession: false },
});

// ----- Tiny DOM helpers -----
const $ = (id) => document.getElementById(id);
const el = (tag, attrs, ...children) => {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k === 'class') e.className = v;
    else if (k === 'style') e.setAttribute('style', v);
    else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2), v);
    else if (v != null) e.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    e.appendChild(typeof c === 'string' || typeof c === 'number' ? document.createTextNode(String(c)) : c);
  }
  return e;
};
const fmtInt = (n) => Math.round(n).toLocaleString('en-US');
const fmtWeight = (w) => {
  const r = Math.round(w * 10) / 10;
  return Number.isInteger(r) ? String(r) : r.toFixed(1);
};

// Date helpers — we treat the `date` column as a calendar date (no tz).
const parseDate = (s) => {
  // s is "YYYY-MM-DD"; build local date so display matches the gym day.
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
};
const fmtDateShort = (s) => {
  const d = parseDate(s);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
};
const today = () => new Date(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());
const daysBetween = (a, b) => Math.round((b - a) / 86400000);

// Convert JS getDay() (Sun=0..Sat=6) to ISO weekday (Mon=1..Sun=7).
const isoWeekday = (d) => ((d.getDay() + 6) % 7) + 1;

// Pick the next session date given:
//   - latestDateStr: when the user last lifted ('YYYY-MM-DD' or null)
//   - scheduleDays:  ISO weekdays the program runs (e.g. [1, 3, 5] = M/W/F)
//
// Rule: starting from today (or tomorrow if user already lifted today),
// scan forward up to 7 days for the next day whose ISO weekday is in scheduleDays.
function nextSessionDate(latestDateStr, scheduleDays) {
  const days = (scheduleDays && scheduleDays.length) ? scheduleDays : [1, 2, 3, 4, 5, 6, 7];
  const now = today();
  const liftedToday = latestDateStr && daysBetween(parseDate(latestDateStr), now) === 0;
  const start = new Date(now);
  if (liftedToday) start.setDate(start.getDate() + 1);
  for (let i = 0; i < 7; i++) {
    const candidate = new Date(start);
    candidate.setDate(start.getDate() + i);
    if (days.includes(isoWeekday(candidate))) return candidate;
  }
  return start; // fallback — shouldn't happen with a non-empty schedule
}

function nextSessionLabel(latestDateStr, scheduleDays) {
  const target = nextSessionDate(latestDateStr, scheduleDays);
  const diff = daysBetween(today(), target);
  if (diff === 0) return 'TODAY';
  if (diff === 1) return 'TOMORROW';
  return target.toLocaleDateString('en-US', { weekday: 'long' }).toUpperCase();
}

// ----- Plate math -----
// Returns { plates: [25, 10, 2.5, ...], remainder, exact: bool }
function platesPerSide(targetWeight, bar = CONFIG.barWeightLbs, plates = CONFIG.availablePlates) {
  const sideWeight = (targetWeight - bar) / 2;
  if (sideWeight < 0) return { plates: [], remainder: targetWeight - bar, exact: false };
  if (sideWeight === 0) return { plates: [], remainder: 0, exact: true };
  let remaining = sideWeight;
  const used = [];
  for (const p of [...plates].sort((a, b) => b - a)) {
    while (remaining >= p - 1e-9) {
      used.push(p);
      remaining = Math.round((remaining - p) * 100) / 100;
    }
  }
  const exact = Math.abs(remaining) < 1e-6;
  return { plates: used, remainder: remaining, exact };
}

function plateString(targetWeight) {
  const { plates, remainder, exact } = platesPerSide(targetWeight);
  if (targetWeight < CONFIG.barWeightLbs) return 'bar only (target is below bar weight)';
  if (plates.length === 0 && targetWeight === CONFIG.barWeightLbs) return 'just the bar (45 lb)';
  // Group identical plates and write them as plain English.
  // [25, 10, 2.5] -> "25 + 10 + 2.5"; [45, 45] -> "two 45s"
  const counts = new Map();
  for (const p of plates) counts.set(p, (counts.get(p) || 0) + 1);
  const parts = [...counts.entries()]
    .sort((a, b) => b[0] - a[0])
    .map(([w, c]) => (c === 1 ? `${fmtWeight(w)}` : `${c}× ${fmtWeight(w)}`));
  let s = parts.join(' + ');
  if (!exact) s += ` (${fmtWeight(remainder)} lb short — closest loadable)`;
  return s;
}

// ----- Data fetch -----
async function fetchAll() {
  // Fetch in parallel. Programs/lifts/program_workouts are tiny lookup tables.
  const [programsRes, liftsRes, sessionsRes, setsRes, programWorkoutsRes] = await Promise.all([
    supa.from('programs').select('*'),
    supa.from('lifts').select('*'),
    supa.from('sessions').select('*').order('date', { ascending: false }).order('id', { ascending: false }),
    supa.from('sets').select('*'),
    supa.from('program_workouts').select('*').order('program_id').order('label').order('position'),
  ]);
  for (const r of [programsRes, liftsRes, sessionsRes, setsRes, programWorkoutsRes]) {
    if (r.error) throw new Error(r.error.message);
  }
  return {
    programs: programsRes.data ?? [],
    lifts: liftsRes.data ?? [],
    sessions: sessionsRes.data ?? [],
    sets: setsRes.data ?? [],
    programWorkouts: programWorkoutsRes.data ?? [],
  };
}

// ----- Indexing -----
function indexData({ programs, lifts, sessions, sets, programWorkouts }) {
  const programById = new Map(programs.map((p) => [p.id, p]));
  const liftById = new Map(lifts.map((l) => [l.id, l]));
  const sessionById = new Map(sessions.map((s) => [s.id, s]));

  // program_workouts grouped: programWorkoutsByProgramLabel.get(programId).get('A') = [{lift_id, set_count, target_reps, position}, ...]
  const programWorkoutsByProgramLabel = new Map();
  for (const pw of (programWorkouts ?? [])) {
    if (!programWorkoutsByProgramLabel.has(pw.program_id)) {
      programWorkoutsByProgramLabel.set(pw.program_id, new Map());
    }
    const byLabel = programWorkoutsByProgramLabel.get(pw.program_id);
    if (!byLabel.has(pw.label)) byLabel.set(pw.label, []);
    byLabel.get(pw.label).push(pw);
  }
  for (const byLabel of programWorkoutsByProgramLabel.values()) {
    for (const arr of byLabel.values()) arr.sort((a, b) => a.position - b.position);
  }

  // Group sets by session
  const setsBySession = new Map();
  for (const s of sets) {
    if (!setsBySession.has(s.session_id)) setsBySession.set(s.session_id, []);
    setsBySession.get(s.session_id).push(s);
  }
  for (const arr of setsBySession.values()) {
    arr.sort((a, b) => (a.lift_id - b.lift_id) || (a.set_number - b.set_number));
  }

  // Working sets by lift, sorted oldest→newest
  const workingByLift = new Map();
  for (const s of sets) {
    if (s.is_warmup) continue;
    if (!workingByLift.has(s.lift_id)) workingByLift.set(s.lift_id, []);
    workingByLift.get(s.lift_id).push(s);
  }
  for (const [, arr] of workingByLift) {
    arr.sort((a, b) => {
      const sa = sessionById.get(a.session_id);
      const sb = sessionById.get(b.session_id);
      if (sa.date !== sb.date) return sa.date.localeCompare(sb.date);
      return a.set_number - b.set_number;
    });
  }

  return {
    sessions, sets,
    programById, liftById, sessionById,
    setsBySession, workingByLift,
    programWorkoutsByProgramLabel,
  };
}

// Resolve a display name to a lift row (handles aliases).
function findLiftByDisplayName(displayName, lifts) {
  const aliases = MAIN_LIFT_ALIASES[displayName] || [displayName];
  for (const a of aliases) {
    const hit = lifts.find((l) => l.name.toLowerCase() === a.toLowerCase());
    if (hit) return hit;
  }
  return null;
}

// Group a session's sets by lift, in workout order (preserving lift_id order seen).
function sessionLiftBlocks(sessionSets, liftById) {
  const order = [];
  const byLift = new Map();
  for (const s of sessionSets) {
    if (!byLift.has(s.lift_id)) {
      byLift.set(s.lift_id, []);
      order.push(s.lift_id);
    }
    byLift.get(s.lift_id).push(s);
  }
  return order.map((lid) => ({
    lift: liftById.get(lid),
    sets: byLift.get(lid).sort((a, b) => a.set_number - b.set_number),
  }));
}

function workingSetsForLiftOnDate(allSetsOfLift, sessionId) {
  return allSetsOfLift.filter((s) => s.session_id === sessionId && !s.is_warmup);
}

// "Successful" = every working set in that session hit target_reps.
function wasSuccessful(workingSets) {
  if (workingSets.length === 0) return null; // no data
  return workingSets.every((s) => s.actual_reps != null && s.actual_reps >= s.target_reps);
}

// ----- Next workout calculation -----
//
// Sources of truth (post-migration):
//   - program_workouts: which lifts/sets/reps make up each label, in order
//   - programs.schedule_days: ISO weekdays the program runs
//   - sessions/sets: history used only for progression (weight) and alternation
//
// Alternation rule: the next label is whichever label wasn't run last. If
// there's no history yet, we fall back to the lowest label by sort order.
function computeNext(idx) {
  const { programById, liftById, sessions, setsBySession, programWorkoutsByProgramLabel } = idx;

  // Pick the program: use the most recent session's program if any, else the
  // first (and currently only) program in the table.
  const latest = sessions[0] ?? null;
  let program = latest ? programById.get(latest.program_id) : null;
  if (!program) {
    const all = [...programById.values()];
    program = all[0] ?? null;
  }
  if (!program) return null;

  const byLabel = programWorkoutsByProgramLabel.get(program.id);
  if (!byLabel || byLabel.size === 0) {
    return { error: `Program "${program.name}" has no workouts defined.` };
  }

  // Available labels in deterministic order — the program's structure is the
  // source of truth, not history.
  const labels = [...byLabel.keys()].sort();

  // Pick next label: alternate from the latest session, or default to first.
  let nextLabel;
  if (latest && labels.includes(latest.workout_label)) {
    const idxLabel = labels.indexOf(latest.workout_label);
    nextLabel = labels[(idxLabel + 1) % labels.length];
  } else {
    nextLabel = labels[0];
  }

  const slots = byLabel.get(nextLabel) ?? [];
  const nextLifts = [];
  for (const slot of slots) {
    const lift = liftById.get(slot.lift_id);
    if (!lift) continue;
    nextLifts.push(progressionForSlot(lift, slot, program, sessions, setsBySession));
  }

  return {
    label: nextLabel,
    program,
    lifts: nextLifts,
    latestDate: latest?.date ?? null,
  };
}

// Sets/reps come from the program slot. Weight is computed from history.
// If no history exists for this lift yet, we fall back to bar weight as the
// starting point — better than guessing.
function progressionForSlot(lift, slot, program, sessions, setsBySession) {
  // Walk sessions newest→oldest, find ones containing this lift.
  // Build a chronological history of (weight, success) events, oldest→newest.
  const history = [];
  const asc = [...sessions].reverse();
  for (const sess of asc) {
    const sets = (setsBySession.get(sess.id) || []).filter((s) => s.lift_id === lift.id && !s.is_warmup);
    if (sets.length === 0) continue;
    const weight = sets[0].weight; // working sets share the prescribed weight
    const success = wasSuccessful(sets);
    history.push({ date: sess.date, weight, success });
  }

  // No prior history → start fresh at bar weight.
  if (history.length === 0) {
    return {
      lift,
      weight: CONFIG.barWeightLbs,
      sets: slot.set_count,
      reps: slot.target_reps,
      reason: 'starting',
      delta: 0,
      lastWeight: null,
    };
  }

  const last = history[history.length - 1];

  // Pick increment. Default: program.progression_compound; OHP/Press use the smaller increment.
  const isOhpish = /press|ohp/i.test(lift.name) && !/bench/i.test(lift.name);
  const inc = Number(isOhpish ? program.progression_ohp : program.progression_compound) || 5;
  const deloadPct = Number(program.deload_percent) || 10;
  const deloadThresh = program.deload_threshold ?? 3;

  // Count consecutive failures at the *most recent* weight.
  let failsAtCurrent = 0;
  for (let i = history.length - 1; i >= 0; i--) {
    if (history[i].weight !== last.weight) break;
    if (history[i].success === false) failsAtCurrent++;
    else if (history[i].success === true) break;
  }

  let nextWeight, reason;
  if (failsAtCurrent >= deloadThresh) {
    nextWeight = roundToLoadable(Number(last.weight) * (1 - deloadPct / 100));
    reason = 'deload';
  } else if (last.success === false) {
    nextWeight = Number(last.weight);
    reason = 'repeat';
  } else if (last.success === true) {
    nextWeight = Number(last.weight) + inc;
    reason = 'progress';
  } else {
    nextWeight = Number(last.weight);
    reason = 'unknown';
  }

  return {
    lift,
    weight: nextWeight,
    sets: slot.set_count,
    reps: slot.target_reps,
    reason,
    delta: nextWeight - Number(last.weight),
    lastWeight: Number(last.weight),
  };
}

// Round target weight to nearest loadable increment given available plates.
// Smallest plate is the smallest increment per side, so per-bar smallest = 2 * minPlate.
function roundToLoadable(w) {
  const minPlate = Math.min(...CONFIG.availablePlates);
  const step = minPlate * 2;
  const rel = w - CONFIG.barWeightLbs;
  if (rel <= 0) return CONFIG.barWeightLbs;
  return CONFIG.barWeightLbs + Math.round(rel / step) * step;
}

// ----- Renderers -----

function renderSessions(idx) {
  const root = $('sessions');
  root.classList.remove('loading');
  root.innerHTML = '';

  const list = el('div', { class: 'session-list' });

  // Upcoming session, expanded by default.
  const next = computeNext(idx);
  if (next && !next.error) {
    list.appendChild(buildNextCard(next));
  } else if (next?.error) {
    list.appendChild(el('div', { class: 'error' }, next.error));
  }

  // Past sessions, newest first, collapsed.
  const past = [...idx.sessionById.values()].sort((a, b) => {
    if (a.date !== b.date) return b.date.localeCompare(a.date);
    return b.id - a.id;
  }).slice(0, 10);

  if (past.length === 0 && !next) {
    root.appendChild(el('div', { class: 'empty' }, 'No sessions logged yet. Add one through Claude.'));
    return;
  }

  for (const s of past) list.appendChild(buildPastCard(s, idx));

  root.appendChild(list);
}

function buildNextCard(next) {
  const sessionEl = el('div', { class: 'session next expanded' });

  const summary = el('div', { class: 'summary' },
    el('span', { class: 'badge-next' }, nextSessionLabel(next.latestDate, next.program?.schedule_days)),
    el('span', { class: 'label' }, next.label),
    el('span', { class: 'lifts-summary' }, next.program?.name || 'Program'),
    el('span', { class: 'chevron' }, '›')
  );
  summary.addEventListener('click', () => sessionEl.classList.toggle('expanded'));
  sessionEl.appendChild(summary);

  const detail = el('div', { class: 'detail next-detail' });

  if (next.lifts.length === 0) {
    detail.appendChild(el('div', { class: 'empty' }, 'No lifts found for this workout label yet.'));
  }

  for (const item of next.lifts) {
    const deltaStr =
      item.delta > 0 ? `+${fmtWeight(item.delta)} lb` :
      item.delta < 0 ? `${fmtWeight(item.delta)} lb (deload)` :
      'same as last';
    const deltaCls =
      item.delta > 0 ? 'delta-up' :
      item.delta < 0 ? 'delta-down' :
      'delta-flat';

    const setsText = `${item.sets} ${item.sets === 1 ? 'set' : 'sets'} × ${item.reps} reps`;
    const platesText = item.weight < CONFIG.barWeightLbs
      ? 'target is below bar weight'
      : plateString(item.weight);

    detail.appendChild(el('div', { class: 'lift-row' },
      el('div', { class: 'top' },
        el('div', { class: 'name' }, item.lift.name),
        el('div', { class: 'weight' }, fmtWeight(item.weight), el('span', { class: 'unit' }, 'lb'))
      ),
      el('div', { class: 'sets-line' },
        setsText,
        el('span', { class: deltaCls }, deltaStr),
      ),
      el('div', { class: 'plates-line' },
        el('span', { class: 'lbl' }, 'Plates per side:'),
        platesText,
      )
    ));
  }

  sessionEl.appendChild(detail);
  return sessionEl;
}

function buildPastCard(s, idx) {
  const sessionSets = idx.setsBySession.get(s.id) || [];
  const blocks = sessionLiftBlocks(sessionSets, idx.liftById);

  // Compact summary line: "Squat 70 ✓ · Bench —"
  const summaryItems = blocks.map((b) => {
    const working = b.sets.filter((x) => !x.is_warmup);
    if (working.length === 0) return null;
    const success = wasSuccessful(working);
    const weight = working[0].weight;
    const cls = success === true ? 'ok' : success === false ? 'miss' : '';
    const mark = success === true ? '✓' : success === false ? '✗' : '·';
    const shortName = shortLiftName(b.lift?.name || '?');
    return el('span', null, `${shortName} ${fmtWeight(weight)} `, el('span', { class: cls }, mark));
  }).filter(Boolean);

  const summaryLine = el('div', { class: 'lifts-summary' });
  summaryItems.forEach((node, i) => {
    if (i > 0) summaryLine.appendChild(document.createTextNode(' · '));
    summaryLine.appendChild(node);
  });

  const sessionEl = el('div', { class: 'session', 'data-id': s.id });

  const summary = el('div', { class: 'summary' },
    el('span', { class: 'date' }, fmtDateShort(s.date)),
    el('span', { class: 'label' }, s.workout_label || '?'),
    summaryLine,
    el('span', { class: 'chevron' }, '›')
  );
  summary.addEventListener('click', () => sessionEl.classList.toggle('expanded'));
  sessionEl.appendChild(summary);

  const detail = el('div', { class: 'detail' });
  for (const b of blocks) {
    const working = b.sets.filter((x) => !x.is_warmup);
    if (working.length === 0) continue;
    const setPills = working.map((set) => {
      const hit = set.actual_reps != null && set.actual_reps >= set.target_reps;
      const cls = hit ? 'set-pill' : 'set-pill miss';
      const repsText = set.actual_reps == null
        ? `?/${set.target_reps}`
        : `${set.actual_reps}/${set.target_reps}`;
      return el('span', { class: cls }, `${fmtWeight(set.weight)}×${repsText}`);
    });
    detail.appendChild(el('div', { class: 'detail-lift' },
      el('div', { class: 'name' }, b.lift?.name || 'Unknown'),
      el('div', { class: 'sets' }, ...setPills)
    ));
  }
  if (s.notes) {
    detail.appendChild(el('div', { class: 'session-notes' }, s.notes));
  }
  sessionEl.appendChild(detail);

  return sessionEl;
}

function shortLiftName(name) {
  const map = {
    'squat': 'Squat',
    'back squat': 'Squat',
    'bench press': 'Bench',
    'bench': 'Bench',
    'overhead press': 'OHP',
    'standing press': 'OHP',
    'press': 'OHP',
    'ohp': 'OHP',
    'barbell row': 'Row',
    'pendlay row': 'Row',
    'row': 'Row',
    'deadlift': 'DL',
    'conventional deadlift': 'DL',
  };
  return map[name.toLowerCase()] || name;
}

function renderCharts(idx, lifts) {
  const root = $('charts');
  root.classList.remove('loading');
  root.innerHTML = '';

  // All charts share the same 30-day window so x-axes line up.
  const WINDOW_DAYS = 30;
  const oneDay = 86400000;
  const windowEnd = today();
  const windowStart = new Date(windowEnd.getTime() - (WINDOW_DAYS - 1) * oneDay);

  const grid = el('div', { class: 'charts' });
  let rendered = 0;

  for (const displayName of MAIN_LIFTS) {
    const lift = findLiftByDisplayName(displayName, lifts);
    if (!lift) continue;

    // Per session: take top working set weight that day for this lift.
    const working = idx.workingByLift.get(lift.id) || [];
    if (working.length === 0) continue;

    const byDate = new Map();
    for (const s of working) {
      const sess = idx.sessionById.get(s.session_id);
      if (!sess) continue;
      const cur = byDate.get(sess.date) || 0;
      if (s.weight > cur) byDate.set(sess.date, s.weight);
    }
    if (byDate.size === 0) continue;

    const points = [...byDate.entries()]
      .sort((a, b) => a[0].localeCompare(b[0]))
      .map(([date, w]) => ({ x: parseDate(date), y: w }))
      .filter((p) => p.x >= windowStart && p.x <= windowEnd);

    if (points.length === 0) continue;

    const card = el('div', { class: 'chart-card' });
    card.appendChild(el('div', { class: 'head' },
      el('div', { class: 'name' }, displayName),
      el('div', { class: 'latest' }, `${fmtWeight(points[points.length - 1].y)} lb`)
    ));
    const canvas = el('canvas');
    card.appendChild(canvas);
    grid.appendChild(card);

    // Y bounds: pad around the data so the line doesn't kiss the card edges.
    const ys = points.map((p) => p.y);
    const yMin = Math.min(...ys);
    const yMax = Math.max(...ys);
    const ySpan = yMax - yMin;
    const yPad = ySpan === 0 ? Math.max(yMin * 0.05, 5) : ySpan * 0.25;

    // Render after attached so size is correct.
    queueMicrotask(() => {
      new Chart(canvas, {
        type: 'line',
        data: {
          datasets: [{
            data: points,
            borderColor: '#d97757',
            backgroundColor: 'rgba(217, 119, 87, 0.12)',
            borderWidth: 2,
            pointRadius: points.length === 1 ? 5 : 3,
            pointHoverRadius: points.length === 1 ? 7 : 5,
            pointBackgroundColor: '#d97757',
            pointBorderColor: '#0a0a0a',
            pointBorderWidth: 1,
            tension: 0.2,
            fill: points.length > 1,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 250 },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#161616',
              titleColor: '#f4f4f5',
              bodyColor: '#a1a1aa',
              borderColor: '#232323',
              borderWidth: 1,
              padding: 8,
              displayColors: false,
              callbacks: {
                title: (items) => items[0].parsed.x ? new Date(items[0].parsed.x).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '',
                label: (item) => `${fmtWeight(item.parsed.y)} lb`,
              },
            },
          },
          scales: {
            x: {
              type: 'time',
              min: windowStart,
              max: windowEnd,
              grid: { display: false },
              border: { color: '#232323' },
              ticks: { display: false },
            },
            y: {
              min: yMin - yPad,
              max: yMax + yPad,
              grid: { color: '#1c1c1c' },
              border: { color: '#232323' },
              ticks: { color: '#71717a', font: { size: 10 }, callback: (v) => `${v}` },
            },
          },
        },
      });
    });
    rendered++;
  }

  if (rendered === 0) {
    root.appendChild(el('div', { class: 'empty' }, 'No working sets logged for any main lift yet.'));
  } else {
    root.appendChild(grid);
  }
}

// ----- Boot -----
async function boot() {
  try {
    const data = await fetchAll();
    const idx = indexData(data);

    // Header meta
    const newest = data.sessions[0];
    const headerMeta = newest ? `${data.sessions.length} sessions · last ${fmtDateShort(newest.date)}` : 'no data';
    $('header-meta').textContent = headerMeta;

    renderSessions(idx);
    renderCharts(idx, data.lifts);
  } catch (err) {
    console.error(err);
    const msg = err && err.message ? err.message : String(err);
    for (const id of ['sessions', 'charts']) {
      const e = $(id);
      e.classList.remove('loading');
      e.innerHTML = '';
      e.appendChild(el('div', { class: 'error' }, msg));
    }
  }
}

boot();
</script>
</body>
