<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Lifts" />
<title>Lifts</title>
<link rel="preconnect" href="https://vwejipgsculrwustpooe.supabase.co" />
<style>
  :root {
    --bg: #0a0a0a;
    --bg-elev: #111111;
    --bg-elev-2: #161616;
    --border: #232323;
    --border-strong: #2e2e2e;
    --text: #f4f4f5;
    --text-dim: #a1a1aa;
    --text-faint: #71717a;
    --accent: #d97757;
    --accent-dim: rgba(217, 119, 87, 0.15);
    --good: #4ade80;
    --bad: #f87171;
    --radius: 10px;
    --radius-sm: 6px;
    --font: -apple-system, BlinkMacSystemFont, "Inter", "SF Pro Text", "Segoe UI", system-ui, sans-serif;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;
  }

  * { box-sizing: border-box; }

  html {
    scrollbar-gutter: stable;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior-y: none;
  }

  body {
    max-width: 720px;
    margin: 0 auto;
    padding: max(20px, env(safe-area-inset-top)) 20px max(40px, env(safe-area-inset-bottom));
  }

  header {
    margin-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }

  header .brand-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding-bottom: 12px;
  }

  header h1 {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0;
  }

  header .meta {
    font-size: 12px;
    color: var(--text-faint);
    font-variant-numeric: tabular-nums;
  }

  /* Tab bar — horizontally scrollable on narrow screens */
  .tabs {
    display: flex;
    gap: 0;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab-btn {
    flex: 0 0 auto;
    appearance: none;
    background: none;
    border: none;
    color: var(--text-faint);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 14px;
    margin-bottom: -1px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .tab-btn:hover { color: var(--text-dim); }
  .tab-btn.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }
  .tab-btn:first-child { padding-left: 0; }

  /* Tab panels */
  .tab[hidden] { display: none; }

  section {
    margin-bottom: 44px;
  }

  section > h2 {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin: 0 0 14px 0;
  }
  section > h2 .h2-sub {
    font-weight: 400;
    letter-spacing: 0.04em;
    text-transform: none;
    color: var(--text-faint);
    margin-left: 2px;
  }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-dim);
    font-size: 14px;
    padding: 24px 0;
  }
  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid var(--border-strong);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty {
    color: var(--text-faint);
    font-size: 13px;
    padding: 12px 14px;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
  }

  .error {
    color: var(--bad);
    font-size: 13px;
    padding: 12px 14px;
    border: 1px solid #3f1d1d;
    background: #1a0e0e;
    border-radius: var(--radius);
    font-family: var(--mono);
  }

  /* Up Next */
  .lift-row {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }
  .lift-row:last-child { border-bottom: none; }

  .lift-row .top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 2px;
  }
  .lift-row .name {
    font-weight: 600;
    font-size: 15px;
  }
  .lift-row .weight {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
  }
  .lift-row .weight .unit {
    color: var(--text-faint);
    font-size: 13px;
    font-weight: 400;
    margin-left: 3px;
  }
  .lift-row .sets-line {
    font-size: 13px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }
  .lift-row .sets-line .delta-up { color: var(--good); margin-left: 8px; }
  .lift-row .sets-line .delta-down { color: var(--bad); margin-left: 8px; }
  .lift-row .sets-line .delta-flat { color: var(--text-faint); margin-left: 8px; }
  .lift-row .plates-line {
    margin-top: 4px;
    font-size: 12px;
    color: var(--text-faint);
    font-family: var(--mono);
    font-variant-numeric: tabular-nums;
  }
  .lift-row .plates-line .lbl {
    color: var(--text-faint);
    margin-right: 6px;
  }

  /* Recent sessions */
  .session-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .session {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-elev);
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .session.expanded {
    border-color: var(--border-strong);
  }
  .session > .summary {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 14px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  .session > .summary:active {
    background: var(--bg-elev-2);
  }
  .session .date {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    min-width: 56px;
  }
  .session .label {
    display: inline-block;
    width: 22px;
    height: 22px;
    line-height: 22px;
    text-align: center;
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .session .lifts-summary {
    flex: 1;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .session .ok { color: var(--good); }
  .session .miss { color: var(--bad); }
  .session .chevron {
    color: var(--text-faint);
    font-size: 12px;
    transition: transform 0.15s;
  }
  .session.expanded .chevron {
    transform: rotate(90deg);
  }
  .session > .detail {
    display: none;
    padding: 4px 14px 14px;
    border-top: 1px solid var(--border);
    background: var(--bg-elev-2);
  }
  .session.expanded > .detail {
    display: block;
  }
  .detail-lift {
    margin-top: 10px;
  }
  .detail-lift .name {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .detail-lift .sets {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
  }
  .detail-lift .set-pill {
    padding: 2px 7px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg-elev);
  }
  .detail-lift .set-pill.miss { color: var(--bad); border-color: #3f1d1d; }
  .session-notes {
    margin-top: 10px;
    padding: 8px 10px;
    background: var(--bg-elev);
    border-radius: var(--radius-sm);
    font-size: 12px;
    color: var(--text-dim);
    font-style: italic;
  }

  /* Upcoming session — visually distinct, expanded by default */
  .session.next {
    border-color: var(--accent);
  }
  .session.next .badge-next {
    display: inline-block;
    background: var(--accent-dim);
    color: var(--accent);
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.06em;
    padding: 3px 8px;
    border-radius: 4px;
    flex-shrink: 0;
    font-family: var(--font);
    min-width: 0;
    width: auto;
    height: auto;
    line-height: 1.2;
    text-align: left;
    border: none;
  }
  .session.next .lifts-summary {
    font-family: var(--font);
    font-size: 13px;
    color: var(--text);
  }
  .session.next .lifts-summary .sub {
    color: var(--text-faint);
    font-family: var(--mono);
    font-size: 12px;
  }
  /* The next-detail uses lift-row layout, which has its own horizontal padding,
     so zero out the outer .detail padding to avoid doubled gutters. */
  .session.next > .detail.next-detail {
    padding: 0;
    background: var(--bg-elev);
    border-top: 1px solid var(--border);
  }

  /* Charts */
  .charts {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }
  @media (min-width: 600px) {
    .charts { grid-template-columns: 1fr 1fr; }
  }
  .chart-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-elev);
    padding: 14px;
  }
  .chart-card .head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .chart-card .name {
    font-size: 13px;
    font-weight: 600;
  }
  .chart-card .latest {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-faint);
    font-variant-numeric: tabular-nums;
  }
  .chart-card canvas {
    width: 100% !important;
    height: 130px !important;
  }

  /* ---- Plan tab ---- */
  .plan-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-elev);
    overflow: hidden;
  }
  .plan-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 16px 16px 10px;
    border-bottom: 1px solid var(--border);
  }
  .plan-name {
    font-size: 16px;
    font-weight: 600;
  }
  .plan-schedule {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }
  .plan-desc {
    padding: 12px 16px;
    color: var(--text-dim);
    font-size: 13px;
    border-bottom: 1px solid var(--border);
  }
  .plan-workout {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .plan-workout-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .plan-workout-head .label {
    display: inline-block;
    width: 22px;
    height: 22px;
    line-height: 22px;
    text-align: center;
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
  }
  .plan-workout-head .plan-workout-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .plan-lift-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .plan-lift-list li {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
  }
  .plan-lift-list .lift-name { color: var(--text); }
  .plan-lift-list .lift-prescription {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }
  .plan-rules {
    padding: 14px 16px;
    background: var(--bg-elev-2);
  }
  .plan-rules-head {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 8px;
  }
  .plan-rule-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-size: 13px;
    color: var(--text-dim);
  }

  /* ---- Exercises tab ---- */
  .exercise-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .exercise-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-elev);
    padding: 14px 16px;
  }
  .exercise-name {
    font-size: 15px;
    font-weight: 600;
  }

  /* Two-column body: info on the left, chart on the right.
     Stacked on narrow viewports where the chart would lose readability. */
  .exercise-body {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    align-items: stretch;
  }
  @media (min-width: 520px) {
    .exercise-body {
      grid-template-columns: 1fr minmax(180px, 280px);
      gap: 16px;
    }
  }
  .exercise-info {
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .exercise-chart-wrap {
    min-width: 0;
    display: flex;
    align-items: center;
  }
  /* Push the "Last" line to the bottom of the info column on wide layouts. */
  .exercise-info .exercise-last {
    margin-top: auto;
  }

  .muscle-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .muscle-chips .chip {
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 2px 8px;
    font-size: 11px;
    color: var(--text-dim);
  }
  .exercise-notes {
    font-size: 12px;
    color: var(--text-dim);
    font-style: italic;
  }
  .exercise-last {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding-top: 4px;
  }
  .exercise-last .lbl {
    font-size: 11px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .exercise-last .val {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .exercise-chart {
    width: 100% !important;
    height: 110px !important;
    display: block;
  }
  .exercise-link {
    display: inline-block;
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s;
  }
  .exercise-link:hover { border-bottom-color: var(--accent); }
  .exercise-link::after {
    content: ' ↗';
    color: var(--text-faint);
  }

  /* ---- Setup tab (markdown prose + copy button) ---- */
  #setup .prose {
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
  }
  #setup .prose > *:first-child { margin-top: 0; }
  #setup .prose h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0 0 16px;
  }
  #setup .prose h2 {
    font-size: 16px;
    font-weight: 600;
    margin: 32px 0 10px;
    text-transform: none;
    color: var(--text);
    letter-spacing: -0.005em;
  }
  #setup .prose h3 {
    font-size: 14px;
    font-weight: 600;
    margin: 22px 0 8px;
    color: var(--text);
  }
  #setup .prose p { margin: 10px 0; color: var(--text-dim); }
  #setup .prose strong { color: var(--text); font-weight: 600; }
  #setup .prose em { color: var(--text); font-style: italic; }
  #setup .prose a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s;
  }
  #setup .prose a:hover { border-bottom-color: var(--accent); }
  #setup .prose ul, #setup .prose ol {
    margin: 10px 0;
    padding-left: 22px;
    color: var(--text-dim);
  }
  #setup .prose li { margin: 4px 0; }
  #setup .prose li::marker { color: var(--text-faint); }
  #setup .prose code {
    font-family: var(--mono);
    font-size: 13px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    color: var(--text);
  }
  #setup .prose pre {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    overflow-x: auto;
    font-size: 13px;
    line-height: 1.5;
  }
  #setup .prose pre code {
    background: none;
    border: none;
    padding: 0;
    font-size: inherit;
    color: var(--text);
    white-space: pre;
  }
  #setup .prose hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 28px 0;
  }

  /* Copy button wrapper around the first prompt code block */
  #setup .copy-wrap { position: relative; }
  #setup .copy-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    appearance: none;
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: inherit;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }
  #setup .copy-btn:hover {
    color: var(--text);
    border-color: var(--border-strong);
    background: var(--bg-elev);
  }

  /* ---- Body & Mind tab ---- */

  /* Hub */
  .bm-hub-intro {
    margin-bottom: 28px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }
  .bm-hub-title {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }
  .bm-hub-sub {
    font-size: 13px;
    color: var(--text-dim);
  }

  .bm-section + .bm-section { margin-top: 32px; }
  .bm-section-head {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin: 0 0 14px;
  }
  .bm-cat-head {
    font-size: 11px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin: 18px 0 8px;
  }
  .bm-section-head + .bm-card-grid { margin-top: 0; }

  .bm-card-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .bm-card {
    display: block;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-elev);
    text-decoration: none;
    color: inherit;
    font-size: 14px;
    line-height: 1.5;
    /* One-line, ellipsis if it overflows */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: border-color 0.15s, background 0.15s;
  }
  .bm-card:hover { border-color: var(--border-strong); background: var(--bg-elev-2); }
  .bm-card-name {
    font-weight: 600;
    color: var(--text);
  }
  .bm-card-blurb {
    color: var(--text-dim);
  }
  /* A subtle accent border on principles to flag them as different */
  .bm-card-principle { border-left: 2px solid var(--accent); }

  /* Detail */
  .bm-back {
    display: inline-block;
    font-size: 12px;
    color: var(--text-dim);
    text-decoration: none;
    margin-bottom: 16px;
    transition: color 0.15s;
  }
  .bm-back:hover { color: var(--text); }
  .bm-detail-kind {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 6px;
  }
  .bm-detail-kind .sep { color: var(--text-faint); }
  .bm-detail-title {
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0 0 6px;
    text-transform: none;
    color: var(--text);
  }
  .bm-detail-dose {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    margin-bottom: 10px;
  }
  .bm-detail-blurb {
    font-size: 15px;
    line-height: 1.55;
    color: var(--text-dim);
    margin: 0 0 24px;
  }

  .bm-detail-body { margin-top: 8px; }
  .bm-block-head {
    font-size: 11px;
    font-weight: 600;

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.4';
import Chart from 'https://esm.sh/chart.js@4.4.6/auto';
// Chart.js v4 ships without a date adapter; this registers date-fns for the time scale.
import 'https://esm.sh/chartjs-adapter-date-fns@3.0.0?deps=chart.js@4.4.6';
import { marked } from 'https://esm.sh/marked@14.1.3';

// ----- Config -----
const CONFIG = {
  supabaseUrl: 'https://vwejipgsculrwustpooe.supabase.co',
  supabaseAnonKey: 'sb_publishable_EeD2Lxd2PLkGfRu-AQWuhA_yhPi0WCE',
  barWeightLbs: 45,
  availablePlates: [45, 25, 10, 5, 2.5],
};

// Main lifts shown in the progression chart grid, in standard StrongLifts order.
const MAIN_LIFTS = ['Squat', 'Bench Press', 'Barbell Row', 'Overhead Press', 'Deadlift'];
const MAIN_LIFT_ALIASES = {
  'Squat': ['Squat', 'Back Squat', 'Barbell Squat'],
  'Bench Press': ['Bench Press', 'Bench'],
  'Barbell Row': ['Barbell Row', 'Pendlay Row', 'Row'],
  'Overhead Press': ['Overhead Press', 'OHP', 'Press', 'Standing Press'],
  'Deadlift': ['Deadlift', 'Conventional Deadlift'],
};

// ----- Supabase -----
const supa = createClient(CONFIG.supabaseUrl, CONFIG.supabaseAnonKey, {
  auth: { persistSession: false },
});

// ----- Tiny DOM helpers -----
const $ = (id) => document.getElementById(id);
const el = (tag, attrs, ...children) => {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k === 'class') e.className = v;
    else if (k === 'style') e.setAttribute('style', v);
    else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2), v);
    else if (v != null) e.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    e.appendChild(typeof c === 'string' || typeof c === 'number' ? document.createTextNode(String(c)) : c);
  }
  return e;
};
const fmtInt = (n) => Math.round(n).toLocaleString('en-US');
const fmtWeight = (w) => {
  const r = Math.round(w * 10) / 10;
  return Number.isInteger(r) ? String(r) : r.toFixed(1);
};
const capitalizeFirst = (s) => s ? s[0].toUpperCase() + s.slice(1) : s;

// Date helpers — we treat the `date` column as a calendar date (no tz).
const parseDate = (s) => {
  // s is "YYYY-MM-DD"; build local date so display matches the gym day.
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
};
const fmtDateShort = (s) => {
  const d = parseDate(s);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
};
const today = () => new Date(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());
const daysBetween = (a, b) => Math.round((b - a) / 86400000);

// Convert JS getDay() (Sun=0..Sat=6) to ISO weekday (Mon=1..Sun=7).
const isoWeekday = (d) => ((d.getDay() + 6) % 7) + 1;

// Pick the next session date given:
//   - latestDateStr: when the user last lifted ('YYYY-MM-DD' or null)
//   - scheduleDays:  ISO weekdays the program runs (e.g. [1, 3, 5] = M/W/F)
//
// Rule: starting from today (or tomorrow if user already lifted today),
// scan forward up to 7 days for the next day whose ISO weekday is in scheduleDays.
function nextSessionDate(latestDateStr, scheduleDays) {
  const days = (scheduleDays && scheduleDays.length) ? scheduleDays : [1, 2, 3, 4, 5, 6, 7];
  const now = today();
  const liftedToday = latestDateStr && daysBetween(parseDate(latestDateStr), now) === 0;
  const start = new Date(now);
  if (liftedToday) start.setDate(start.getDate() + 1);
  for (let i = 0; i < 7; i++) {
    const candidate = new Date(start);
    candidate.setDate(start.getDate() + i);
    if (days.includes(isoWeekday(candidate))) return candidate;
  }
  return start; // fallback — shouldn't happen with a non-empty schedule
}

function nextSessionLabel(latestDateStr, scheduleDays) {
  const target = nextSessionDate(latestDateStr, scheduleDays);
  const diff = daysBetween(today(), target);
  if (diff === 0) return 'TODAY';
  if (diff === 1) return 'TOMORROW';
  return target.toLocaleDateString('en-US', { weekday: 'long' }).toUpperCase();
}

// ----- Plate math -----
// Returns { plates: [25, 10, 2.5, ...], remainder, exact: bool }
function platesPerSide(targetWeight, bar = CONFIG.barWeightLbs, plates = CONFIG.availablePlates) {
  const sideWeight = (targetWeight - bar) / 2;
  if (sideWeight < 0) return { plates: [], remainder: targetWeight - bar, exact: false };
  if (sideWeight === 0) return { plates: [], remainder: 0, exact: true };
  let remaining = sideWeight;
  const used = [];
  for (const p of [...plates].sort((a, b) => b - a)) {
    while (remaining >= p - 1e-9) {
      used.push(p);
      remaining = Math.round((remaining - p) * 100) / 100;
    }
  }
  const exact = Math.abs(remaining) < 1e-6;
  return { plates: used, remainder: remaining, exact };
}

function plateString(targetWeight) {
  const { plates, remainder, exact } = platesPerSide(targetWeight);
  if (targetWeight < CONFIG.barWeightLbs) return 'bar only (target is below bar weight)';
  if (plates.length === 0 && targetWeight === CONFIG.barWeightLbs) return 'just the bar (45 lb)';
  // Group identical plates and write them as plain English.
  // [25, 10, 2.5] -> "25 + 10 + 2.5"; [45, 45] -> "two 45s"
  const counts = new Map();
  for (const p of plates) counts.set(p, (counts.get(p) || 0) + 1);
  const parts = [...counts.entries()]
    .sort((a, b) => b[0] - a[0])
    .map(([w, c]) => (c === 1 ? `${fmtWeight(w)}` : `${c}× ${fmtWeight(w)}`));
  let s = parts.join(' + ');
  if (!exact) s += ` (${fmtWeight(remainder)} lb short — closest loadable)`;
  return s;
}

// ----- Data fetch -----
async function fetchAll() {
  // Fetch in parallel. Programs/lifts/program_workouts are tiny lookup tables.
  const [programsRes, liftsRes, sessionsRes, setsRes, programWorkoutsRes] = await Promise.all([
    supa.from('programs').select('*'),
    supa.from('lifts').select('*'),
    supa.from('sessions').select('*').order('date', { ascending: false }).order('id', { ascending: false }),
    supa.from('sets').select('*'),
    supa.from('program_workouts').select('*').order('program_id').order('label').order('position'),
  ]);
  for (const r of [programsRes, liftsRes, sessionsRes, setsRes, programWorkoutsRes]) {
    if (r.error) throw new Error(r.error.message);
  }
  return {
    programs: programsRes.data ?? [],
    lifts: liftsRes.data ?? [],
    sessions: sessionsRes.data ?? [],
    sets: setsRes.data ?? [],
    programWorkouts: programWorkoutsRes.data ?? [],
  };
}

// ----- Indexing -----
function indexData({ programs, lifts, sessions, sets, programWorkouts }) {
  const programById = new Map(programs.map((p) => [p.id, p]));
  const liftById = new Map(lifts.map((l) => [l.id, l]));
  const sessionById = new Map(sessions.map((s) => [s.id, s]));

  // program_workouts grouped: programWorkoutsByProgramLabel.get(programId).get('A') = [{lift_id, set_count, target_reps, position}, ...]
  const programWorkoutsByProgramLabel = new Map();
  for (const pw of (programWorkouts ?? [])) {
    if (!programWorkoutsByProgramLabel.has(pw.program_id)) {
      programWorkoutsByProgramLabel.set(pw.program_id, new Map());
    }
    const byLabel = programWorkoutsByProgramLabel.get(pw.program_id);
    if (!byLabel.has(pw.label)) byLabel.set(pw.label, []);
    byLabel.get(pw.label).push(pw);
  }
  for (const byLabel of programWorkoutsByProgramLabel.values()) {
    for (const arr of byLabel.values()) arr.sort((a, b) => a.position - b.position);
  }

  // Group sets by session
  const setsBySession = new Map();
  for (const s of sets) {
    if (!setsBySession.has(s.session_id)) setsBySession.set(s.session_id, []);
    setsBySession.get(s.session_id).push(s);
  }
  for (const arr of setsBySession.values()) {
    arr.sort((a, b) => (a.lift_id - b.lift_id) || (a.set_number - b.set_number));
  }

  // Working sets by lift, sorted oldest→newest
  const workingByLift = new Map();
  for (const s of sets) {
    if (s.is_warmup) continue;
    if (!workingByLift.has(s.lift_id)) workingByLift.set(s.lift_id, []);
    workingByLift.get(s.lift_id).push(s);
  }
  for (const [, arr] of workingByLift) {
    arr.sort((a, b) => {
      const sa = sessionById.get(a.session_id);
      const sb = sessionById.get(b.session_id);
      if (sa.date !== sb.date) return sa.date.localeCompare(sb.date);
      return a.set_number - b.set_number;
    });
  }

  return {
    sessions, sets,
    programById, liftById, sessionById,
    setsBySession, workingByLift,
    programWorkoutsByProgramLabel,
  };
}

// Resolve a display name to a lift row (handles aliases).
function findLiftByDisplayName(displayName, lifts) {
  const aliases = MAIN_LIFT_ALIASES[displayName] || [displayName];
  for (const a of aliases) {
    const hit = lifts.find((l) => l.name.toLowerCase() === a.toLowerCase());
    if (hit) return hit;
  }
  return null;
}

// Group a session's sets by lift, in workout order (preserving lift_id order seen).
function sessionLiftBlocks(sessionSets, liftById) {
  const order = [];
  const byLift = new Map();
  for (const s of sessionSets) {
    if (!byLift.has(s.lift_id)) {
      byLift.set(s.lift_id, []);
      order.push(s.lift_id);
    }
    byLift.get(s.lift_id).push(s);
  }
  return order.map((lid) => ({
    lift: liftById.get(lid),
    sets: byLift.get(lid).sort((a, b) => a.set_number - b.set_number),
  }));
}

function workingSetsForLiftOnDate(allSetsOfLift, sessionId) {
  return allSetsOfLift.filter((s) => s.session_id === sessionId && !s.is_warmup);
}

// "Successful" = every working set in that session hit target_reps.
function wasSuccessful(workingSets) {
  if (workingSets.length === 0) return null; // no data
  return workingSets.every((s) => s.actual_reps != null && s.actual_reps >= s.target_reps);
}

// ----- Next workout calculation -----
//
// Sources of truth (post-migration):
//   - program_workouts: which lifts/sets/reps make up each label, in order
//   - programs.schedule_days: ISO weekdays the program runs
//   - sessions/sets: history used only for progression (weight) and alternation
//
// Alternation rule: the next label is whichever label wasn't run last. If
// there's no history yet, we fall back to the lowest label by sort order.
function computeNext(idx) {
  const { programById, liftById, sessions, setsBySession, programWorkoutsByProgramLabel } = idx;

  // Pick the program: use the most recent session's program if any, else the
  // first (and currently only) program in the table.
  const latest = sessions[0] ?? null;
  let program = latest ? programById.get(latest.program_id) : null;
  if (!program) {
    const all = [...programById.values()];
    program = all[0] ?? null;
  }
  if (!program) return null;

  const byLabel = programWorkoutsByProgramLabel.get(program.id);
  if (!byLabel || byLabel.size === 0) {
    return { error: `Program "${program.name}" has no workouts defined.` };
  }

  // Available labels in deterministic order — the program's structure is the
  // source of truth, not history.
  const labels = [...byLabel.keys()].sort();

  // Pick next label: alternate from the latest session, or default to first.
  let nextLabel;
  if (latest && labels.includes(latest.workout_label)) {
    const idxLabel = labels.indexOf(latest.workout_label);
    nextLabel = labels[(idxLabel + 1) % labels.length];
  } else {
    nextLabel = labels[0];
  }

  const slots = byLabel.get(nextLabel) ?? [];
  const nextLifts = [];
  for (const slot of slots) {
    const lift = liftById.get(slot.lift_id);
    if (!lift) continue;
    nextLifts.push(progressionForSlot(lift, slot, program, sessions, setsBySession));
  }

  return {
    label: nextLabel,
    program,
    lifts: nextLifts,
    latestDate: latest?.date ?? null,
  };
}

// Sets/reps come from the program slot. Weight is computed from history.
// If no history exists for this lift yet, we fall back to bar weight as the
// starting point — better than guessing.
function progressionForSlot(lift, slot, program, sessions, setsBySession) {
  // Walk sessions newest→oldest, find ones containing this lift.
  // Build a chronological history of (weight, success) events, oldest→newest.
  const history = [];
  const asc = [...sessions].reverse();
  for (const sess of asc) {
    const sets = (setsBySession.get(sess.id) || []).filter((s) => s.lift_id === lift.id && !s.is_warmup);
    if (sets.length === 0) continue;
    const weight = sets[0].weight; // working sets share the prescribed weight
    const success = wasSuccessful(sets);
    history.push({ date: sess.date, weight, success });
  }

  // No prior history → start fresh at bar weight.
  if (history.length === 0) {
    return {
      lift,
      weight: CONFIG.barWeightLbs,
      sets: slot.set_count,
      reps: slot.target_reps,
      reason: 'starting',
      delta: 0,
      lastWeight: null,
    };
  }

  const last = history[history.length - 1];

  // Pick increment. Default: program.progression_compound; OHP/Press use the smaller increment.
  const isOhpish = /press|ohp/i.test(lift.name) && !/bench/i.test(lift.name);
  const inc = Number(isOhpish ? program.progression_ohp : program.progression_compound) || 5;
  const deloadPct = Number(program.deload_percent) || 10;
  const deloadThresh = program.deload_threshold ?? 3;

  // Count consecutive failures at the *most recent* weight.
  let failsAtCurrent = 0;
  for (let i = history.length - 1; i >= 0; i--) {
    if (history[i].weight !== last.weight) break;
    if (history[i].success === false) failsAtCurrent++;
    else if (history[i].success === true) break;
  }

  let nextWeight, reason;
  if (failsAtCurrent >= deloadThresh) {
    nextWeight = roundToLoadable(Number(last.weight) * (1 - deloadPct / 100));
    reason = 'deload';
  } else if (last.success === false) {
    nextWeight = Number(last.weight);
    reason = 'repeat';
  } else if (last.success === true) {
    nextWeight = Number(last.weight) + inc;
    reason = 'progress';
  } else {
    nextWeight = Number(last.weight);
    reason = 'unknown';
  }

  return {
    lift,
    weight: nextWeight,
    sets: slot.set_count,
    reps: slot.target_reps,
    reason,
    delta: nextWeight - Number(last.weight),
    lastWeight: Number(last.weight),
  };
}

// Round target weight to nearest loadable increment given available plates.
// Smallest plate is the smallest increment per side, so per-bar smallest = 2 * minPlate.
function roundToLoadable(w) {
  const minPlate = Math.min(...CONFIG.availablePlates);
  const step = minPlate * 2;
  const rel = w - CONFIG.barWeightLbs;
  if (rel <= 0) return CONFIG.barWeightLbs;
  return CONFIG.barWeightLbs + Math.round(rel / step) * step;
}

// ----- Renderers -----

function renderNext(idx) {
  const root = $('next');
  root.classList.remove('loading');
  root.innerHTML = '';

  const next = computeNext(idx);
  if (next?.error) {
    root.appendChild(el('div', { class: 'error' }, next.error));
    return;
  }
  if (!next) {
    root.appendChild(el('div', { class: 'empty' }, 'No sessions logged yet. Add one through Claude.'));
    return;
  }
  const list = el('div', { class: 'session-list' });
  list.appendChild(buildNextCard(next));
  root.appendChild(list);
}

function renderLog(idx) {
  const root = $('log');
  root.classList.remove('loading');
  root.innerHTML = '';

  const past = [...idx.sessionById.values()].sort((a, b) => {
    if (a.date !== b.date) return b.date.localeCompare(a.date);
    return b.id - a.id;
  }).slice(0, 10);

  if (past.length === 0) {
    root.appendChild(el('div', { class: 'empty' }, 'No past sessions yet.'));
    return;
  }

  const list = el('div', { class: 'session-list' });
  for (const s of past) list.appendChild(buildPastCard(s, idx));
  root.appendChild(list);
}

function buildNextCard(next) {
  const sessionEl = el('div', { class: 'session next expanded' });

  const summary = el('div', { class: 'summary' },
    el('span', { class: 'badge-next' }, nextSessionLabel(next.latestDate, next.program?.schedule_days)),
    el('span', { class: 'label' }, next.label),
    el('span', { class: 'lifts-summary' }, next.program?.name || 'Program'),
    el('span', { class: 'chevron' }, '›')
  );
  summary.addEventListener('click', () => sessionEl.classList.toggle('expanded'));
  sessionEl.appendChild(summary);

  const detail = el('div', { class: 'detail next-detail' });

  if (next.lifts.length === 0) {
    detail.appendChild(el('div', { class: 'empty' }, 'No lifts found for this workout label yet.'));
  }

  for (const item of next.lifts) {
    const deltaStr =
      item.delta > 0 ? `+${fmtWeight(item.delta)} lb` :
      item.delta < 0 ? `${fmtWeight(item.delta)} lb (deload)` :
      'same as last';
    const deltaCls =
      item.delta > 0 ? 'delta-up' :
      item.delta < 0 ? 'delta-down' :
      'delta-flat';

    const setsText = `${item.sets} ${item.sets === 1 ? 'set' : 'sets'} × ${item.reps} reps`;
    const platesText = item.weight < CONFIG.barWeightLbs
      ? 'target is below bar weight'
      : plateString(item.weight);

    detail.appendChild(el('div', { class: 'lift-row' },
      el('div', { class: 'top' },
        el('div', { class: 'name' }, item.lift.name),
        el('div', { class: 'weight' }, fmtWeight(item.weight), el('span', { class: 'unit' }, 'lb'))
      ),
      el('div', { class: 'sets-line' },
        setsText,
        el('span', { class: deltaCls }, deltaStr),
      ),
      el('div', { class: 'plates-line' },
        el('span', { class: 'lbl' }, 'Plates per side:'),
        platesText,
      )
    ));
  }

  sessionEl.appendChild(detail);
  return sessionEl;
}

function buildPastCard(s, idx) {
  const sessionSets = idx.setsBySession.get(s.id) || [];
  const blocks = sessionLiftBlocks(sessionSets, idx.liftById);

  // Compact summary line: "Squat 70 ✓ · Bench —"
  const summaryItems = blocks.map((b) => {
    const working = b.sets.filter((x) => !x.is_warmup);
    if (working.length === 0) return null;
    const success = wasSuccessful(working);
    const weight = working[0].weight;
    const cls = success === true ? 'ok' : success === false ? 'miss' : '';
    const mark = success === true ? '✓' : success === false ? '✗' : '·';
    const shortName = shortLiftName(b.lift?.name || '?');
    return el('span', null, `${shortName} ${fmtWeight(weight)} `, el('span', { class: cls }, mark));
  }).filter(Boolean);

  const summaryLine = el('div', { class: 'lifts-summary' });
  summaryItems.forEach((node, i) => {
    if (i > 0) summaryLine.appendChild(document.createTextNode(' · '));
    summaryLine.appendChild(node);
  });

  const sessionEl = el('div', { class: 'session', 'data-id': s.id });

  const summary = el('div', { class: 'summary' },
    el('span', { class: 'date' }, fmtDateShort(s.date)),
    el('span', { class: 'label' }, s.workout_label || '?'),
    summaryLine,
    el('span', { class: 'chevron' }, '›')
  );
  summary.addEventListener('click', () => sessionEl.classList.toggle('expanded'));
  sessionEl.appendChild(summary);

  const detail = el('div', { class: 'detail' });
  for (const b of blocks) {
    const working = b.sets.filter((x) => !x.is_warmup);
    if (working.length === 0) continue;
    const setPills = working.map((set) => {
      const hit = set.actual_reps != null && set.actual_reps >= set.target_reps;
      const cls = hit ? 'set-pill' : 'set-pill miss';
      const repsText = set.actual_reps == null
        ? `?/${set.target_reps}`
        : `${set.actual_reps}/${set.target_reps}`;
      return el('span', { class: cls }, `${fmtWeight(set.weight)}×${repsText}`);
    });
    detail.appendChild(el('div', { class: 'detail-lift' },
      el('div', { class: 'name' }, b.lift?.name || 'Unknown'),
      el('div', { class: 'sets' }, ...setPills)
    ));
  }
  if (s.notes) {
    detail.appendChild(el('div', { class: 'session-notes' }, s.notes));
  }
  sessionEl.appendChild(detail);

  return sessionEl;
}

function shortLiftName(name) {
  const map = {
    'squat': 'Squat',
    'back squat': 'Squat',
    'bench press': 'Bench',
    'bench': 'Bench',
    'overhead press': 'OHP',
    'standing press': 'OHP',
    'press': 'OHP',
    'ohp': 'OHP',
    'barbell row': 'Row',
    'pendlay row': 'Row',
    'row': 'Row',
    'deadlift': 'DL',
    'conventional deadlift': 'DL',
  };
  return map[name.toLowerCase()] || name;
}

// Shared 30-day rolling window — both Today's progression grid and the
// per-exercise sparklines use it so axes line up across the app.
const PROGRESSION_WINDOW_DAYS = 30;

function progressionWindow() {
  const oneDay = 86400000;
  const end = today();
  const start = new Date(end.getTime() - (PROGRESSION_WINDOW_DAYS - 1) * oneDay);
  return { start, end };
}

// Take the top working-set weight per session day, in ascending date order,
// and clip to the given window.
function progressionPoints(lift, idx, windowStart, windowEnd) {
  const working = idx.workingByLift.get(lift.id) || [];
  if (working.length === 0) return [];
  const byDate = new Map();
  for (const s of working) {
    const sess = idx.sessionById.get(s.session_id);
    if (!sess) continue;
    const w = Number(s.weight) || 0;
    const cur = byDate.get(sess.date) || 0;
    if (w > cur) byDate.set(sess.date, w);
  }
  return [...byDate.entries()]
    .sort((a, b) => a[0].localeCompare(b[0]))
    .map(([date, w]) => ({ x: parseDate(date), y: w }))
    .filter((p) => p.x >= windowStart && p.x <= windowEnd);
}

// Render a Chart.js line chart into the given canvas. Same look across the
// app so the Today grid, the per-exercise card, etc. read as one component.
function renderProgressionChart(canvas, points, windowStart, windowEnd) {
  const ys = points.map((p) => p.y);
  const yMin = Math.min(...ys);
  const yMax = Math.max(...ys);
  const ySpan = yMax - yMin;
  const yPad = ySpan === 0 ? Math.max(yMin * 0.05, 5) : ySpan * 0.25;

  return new Chart(canvas, {
    type: 'line',
    data: {
      datasets: [{
        data: points,
        borderColor: '#d97757',
        backgroundColor: 'rgba(217, 119, 87, 0.12)',
        borderWidth: 2,
        pointRadius: points.length === 1 ? 5 : 3,
        pointHoverRadius: points.length === 1 ? 7 : 5,
        pointBackgroundColor: '#d97757',
        pointBorderColor: '#0a0a0a',
        pointBorderWidth: 1,
        tension: 0.2,
        fill: points.length > 1,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 250 },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#161616',
          titleColor: '#f4f4f5',
          bodyColor: '#a1a1aa',
          borderColor: '#232323',
          borderWidth: 1,
          padding: 8,
          displayColors: false,
          callbacks: {
            title: (items) => items[0].parsed.x ? new Date(items[0].parsed.x).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '',
            label: (item) => `${fmtWeight(item.parsed.y)} lb`,
          },
        },
      },
      scales: {
        x: {
          type: 'time',
          min: windowStart,
          max: windowEnd,
          grid: { display: false },
          border: { color: '#232323' },
          ticks: { display: false },
        },
        y: {
          min: yMin - yPad,
          max: yMax + yPad,
          grid: { color: '#1c1c1c' },
          border: { color: '#232323' },
          ticks: { color: '#71717a', font: { size: 10 }, callback: (v) => `${v}` },
        },
      },
    },
  });
}

function renderCharts(idx, lifts) {
  const root = $('charts');
  root.classList.remove('loading');
  root.innerHTML = '';

  const { start: windowStart, end: windowEnd } = progressionWindow();
  const grid = el('div', { class: 'charts' });
  let rendered = 0;

  for (const displayName of MAIN_LIFTS) {
    const lift = findLiftByDisplayName(displayName, lifts);
    if (!lift) continue;
    const points = progressionPoints(lift, idx, windowStart, windowEnd);
    if (points.length === 0) continue;

    const card = el('div', { class: 'chart-card' });
    card.appendChild(el('div', { class: 'head' },
      el('div', { class: 'name' }, displayName),
      el('div', { class: 'latest' }, `${fmtWeight(points[points.length - 1].y)} lb`)
    ));
    const canvas = el('canvas');
    card.appendChild(canvas);
    grid.appendChild(card);

    queueMicrotask(() => renderProgressionChart(canvas, points, windowStart, windowEnd));
    rendered++;
  }

  if (rendered === 0) {
    root.appendChild(el('div', { class: 'empty' }, 'No working sets logged for any main lift yet.'));
  } else {
    root.appendChild(grid);
  }
}

// ----- Plan tab -----

const ISO_DAY_NAMES = { 1: 'Mon', 2: 'Tue', 3: 'Wed', 4: 'Thu', 5: 'Fri', 6: 'Sat', 7: 'Sun' };

function renderPlan(idx) {
  const root = $('plan');
  root.classList.remove('loading');
  root.innerHTML = '';

  const programs = [...idx.programById.values()];
  if (programs.length === 0) {
    root.appendChild(el('div', { class: 'empty' }, 'No program defined yet.'));
    return;
  }

  // Currently we have one program. If we ever have more, render each.
  for (const program of programs) {
    root.appendChild(buildPlanCard(program, idx));
  }
}

function buildPlanCard(program, idx) {
  const card = el('div', { class: 'plan-card' });

  card.appendChild(el('div', { class: 'plan-head' },
    el('div', { class: 'plan-name' }, program.name),
    el('div', { class: 'plan-schedule' },
      (program.schedule_days || []).map((d) => ISO_DAY_NAMES[d] || d).join(' · ')
    )
  ));

  if (program.description) {
    card.appendChild(el('div', { class: 'plan-desc' }, program.description));
  }

  // Workouts (A / B / ...)
  const byLabel = idx.programWorkoutsByProgramLabel.get(program.id);
  const labels = byLabel ? [...byLabel.keys()].sort() : [];

  for (const label of labels) {
    const slots = byLabel.get(label);
    const block = el('div', { class: 'plan-workout' });
    block.appendChild(el('div', { class: 'plan-workout-head' },
      el('span', { class: 'label' }, label),
      el('span', { class: 'plan-workout-name' }, `Workout ${label}`)
    ));
    const ul = el('ul', { class: 'plan-lift-list' });
    for (const slot of slots) {
      const lift = idx.liftById.get(slot.lift_id);
      ul.appendChild(el('li', null,
        el('span', { class: 'lift-name' }, lift?.name || `Lift #${slot.lift_id}`),
        el('span', { class: 'lift-prescription' }, `${slot.set_count} × ${slot.target_reps}`)
      ));
    }
    block.appendChild(ul);
    card.appendChild(block);
  }

  // Progression rules
  const rules = el('div', { class: 'plan-rules' });
  rules.appendChild(el('div', { class: 'plan-rules-head' }, 'Progression'));
  const compoundInc = Number(program.progression_compound) || 5;
  const ohpInc = Number(program.progression_ohp) || 2.5;
  const deloadPct = Math.round((Number(program.deload_percent) || 0.1) * 100);
  const deloadThresh = program.deload_threshold ?? 3;
  rules.appendChild(el('ul', { class: 'plan-rule-list' },
    el('li', null, `Compound lifts: +${fmtWeight(compoundInc)} lb after a successful session`),
    el('li', null, `Overhead Press: +${fmtWeight(ohpInc)} lb after a successful session`),
    el('li', null, `Failed reps: repeat the same weight next session`),
    el('li', null, `${deloadThresh} consecutive failures: deload by ${deloadPct}%`),
  ));
  card.appendChild(rules);

  return card;
}

// ----- Exercises tab -----

function renderExercises(idx) {
  const root = $('exercises');
  root.classList.remove('loading');
  root.innerHTML = '';

  const lifts = [...idx.liftById.values()];
  if (lifts.length === 0) {
    root.appendChild(el('div', { class: 'empty' }, 'No exercises in the catalog yet.'));
    return;
  }

  // Order: compounds first, others after, alphabetical within each group.
  const order = MAIN_LIFTS.flatMap((n) => MAIN_LIFT_ALIASES[n] || [n]).map((s) => s.toLowerCase());
  const ranked = [...lifts].sort((a, b) => {
    const ai = order.indexOf(a.name.toLowerCase());
    const bi = order.indexOf(b.name.toLowerCase());
    const aOrd = ai === -1 ? 999 : ai;
    const bOrd = bi === -1 ? 999 : bi;
    if (aOrd !== bOrd) return aOrd - bOrd;
    return a.name.localeCompare(b.name);
  });

  const list = el('div', { class: 'exercise-list' });
  for (const lift of ranked) list.appendChild(buildExerciseCard(lift, idx));
  root.appendChild(list);
}

function buildExerciseCard(lift, idx) {
  const card = el('div', { class: 'exercise-card' });
  const working = idx.workingByLift.get(lift.id) || [];
  const latestWeight = working.length ? Number(working[working.length - 1].weight) : null;

  // Two-column body: info on the left, chart on the right at >=520px
  const body = el('div', { class: 'exercise-body' });
  const info = el('div', { class: 'exercise-info' });

  // Top of left column: name, then the form-description link directly below
  info.appendChild(el('div', { class: 'exercise-name' }, lift.name));

  const noteText = lift.notes || (lift.video_url ? 'How to' : null);
  if (noteText) {
    if (lift.video_url) {
      info.appendChild(el('a', {
        class: 'exercise-link',
        href: lift.video_url,
        target: '_blank',
        rel: 'noopener noreferrer',
      }, noteText));
    } else {
      info.appendChild(el('div', { class: 'exercise-notes' }, noteText));
    }
  }

  // Muscle chips
  const muscles = Array.isArray(lift.primary_muscles) ? lift.primary_muscles : [];
  if (muscles.length) {
    const chips = el('div', { class: 'muscle-chips' });
    for (const m of muscles) chips.appendChild(el('span', { class: 'chip' }, capitalizeFirst(m)));
    info.appendChild(chips);
  }

  // Bottom of left column: "Last 70 lb" anchored to the bottom of the card
  if (latestWeight != null) {
    info.appendChild(el('div', { class: 'exercise-last' },
      el('span', { class: 'lbl' }, 'Last'),
      el('span', { class: 'val' }, `${fmtWeight(latestWeight)} lb`)
    ));
  }

  body.appendChild(info);

  // Right column: progression chart (full vertical span of the card)
  const { start: windowStart, end: windowEnd } = progressionWindow();
  const points = progressionPoints(lift, idx, windowStart, windowEnd);
  if (points.length > 0) {
    const chartWrap = el('div', { class: 'exercise-chart-wrap' });
    const canvas = el('canvas', { class: 'exercise-chart' });
    chartWrap.appendChild(canvas);
    body.appendChild(chartWrap);
    queueMicrotask(() => renderProgressionChart(canvas, points, windowStart, windowEnd));
  }

  card.appendChild(body);
  return card;
}

// ----- Setup tab -----
//
// Renders content/setup.md with marked. Adds a "Copy" button to the first
// fenced code block, which contains the prompt the user pastes into their
// own Claude Code session.

const SETUP_PATH = 'content/setup.md';

async function renderSetup() {
  const root = $('setup');
  try {
    const res = await fetch(SETUP_PATH, { cache: 'no-cache' });
    if (!res.ok) throw new Error(`Failed to load ${SETUP_PATH}: ${res.status}`);
    const md = await res.text();
    root.classList.remove('loading');
    root.innerHTML = '';
    const article = el('div', { class: 'prose' });
    article.innerHTML = marked.parse(md);
    root.appendChild(article);

    // Make the first <pre><code> block copyable — that's the user-facing prompt.
    const firstPre = article.querySelector('pre');
    if (firstPre) {
      const text = firstPre.innerText;
      const wrap = el('div', { class: 'copy-wrap' });
      const btn = el('button', { class: 'copy-btn', type: 'button' }, 'Copy prompt');
      btn.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(text);
          btn.textContent = 'Copied';
          setTimeout(() => { btn.textContent = 'Copy prompt'; }, 1500);
        } catch {
          btn.textContent = 'Copy failed';
        }
      });
      firstPre.parentNode.insertBefore(wrap, firstPre);
      wrap.appendChild(btn);
      wrap.appendChild(firstPre);
    }
  } catch (err) {
    console.error(err);
    root.classList.remove('loading');
    root.innerHTML = '';
    root.appendChild(el('div', { class: 'error' }, err.message || String(err)));
  }
}

// ----- Body & Mind tab -----
//
// Data shape (content/bodymind.json):
//   concepts:   things that exist in the body (hormones, processes, nutrients...)
//   practices:  things you do (lifting, walking, sleep, breath work...)
//   principles: load-bearing ideas
//   edges:      typed relations between any of the above (mostly practice→concept)
//
// Routing inside the tab uses hash-format `#bodymind/<id>` so the tab router
// (which keys off the segment before the first `/`) keeps working.

const BODYMIND_PATH = 'content/bodymind.json';

const EDGE_LABELS = {
  improves:    { affecting: 'improves',     affected: 'improved by' },
  suppresses:  { affecting: 'suppresses',   affected: 'suppressed by' },
  produces:    { affecting: 'produces',     affected: 'produced by' },
  depletes:    { affecting: 'depletes',     affected: 'depleted by' },
  depends_on:  { affecting: 'depends on',   affected: 'depended on by' },
  blunts:      { affecting: 'blunts',       affected: 'blunted by' },
  amplifies:   { affecting: 'amplifies',    affected: 'amplified by' },
  engages:     { affecting: 'engages',      affected: 'engaged by' },
};

const EDGE_TONE = {
  improves:   'good',
  suppresses: 'bad',
  produces:   'good',
  depletes:   'neutral',
  depends_on: 'neutral',
  blunts:     'bad',
  amplifies:  'good',
  engages:    'good',
};

const BM_CATEGORY_LABELS = {
  // concept categories
  hormone: 'Hormones',
  process: 'Processes',
  nutrient: 'Nutrients',
  brain: 'Brain',
  nervous_system: 'Nervous system',
  // practice categories
  movement: 'Movement',
  recovery: 'Recovery',
  stressor: 'Stressors',
  breath: 'Breath',
  nutrition: 'Nutrition',
};

let bmData = null;     // loaded JSON
let bmIndex = null;    // { byId: Map, edgesFrom: Map<id, edges>, edgesTo: Map<id, edges> }

async function renderBodyMind() {
  const root = $('bodymind');
  try {
    if (!bmData) {
      const res = await fetch(BODYMIND_PATH, { cache: 'no-cache' });
      if (!res.ok) throw new Error(`Failed to load ${BODYMIND_PATH}: ${res.status}`);
      bmData = await res.json();
      bmIndex = indexBodyMind(bmData);
    }
    paintBodyMind();
    // Repaint when the route inside the bodymind tab changes (e.g., #bodymind/sleep).
    if (!renderBodyMind._wired) {
      window.addEventListener('hashchange', () => {
        if ((location.hash || '').startsWith('#bodymind')) paintBodyMind();
      });
      renderBodyMind._wired = true;
    }
  } catch (err) {
    console.error(err);
    root.classList.remove('loading');
    root.innerHTML = '';
    root.appendChild(el('div', { class: 'error' }, err.message || String(err)));
  }
}

function indexBodyMind(data) {
  const byId = new Map();
  for (const c of data.concepts ?? [])   byId.set(c.id, { ...c, _kind: 'concept' });
  for (const p of data.practices ?? [])  byId.set(p.id, { ...p, _kind: 'practice' });
  for (const p of data.principles ?? []) byId.set(p.id, { ...p, _kind: 'principle' });
  const edgesFrom = new Map();
  const edgesTo = new Map();
  for (const e of data.edges ?? []) {
    if (!edgesFrom.has(e.from)) edgesFrom.set(e.from, []);
    if (!edgesTo.has(e.to))     edgesTo.set(e.to, []);
    edgesFrom.get(e.from).push(e);
    edgesTo.get(e.to).push(e);
  }
  return { byId, edgesFrom, edgesTo };
}

// `#bodymind/<id>` → render detail; `#bodymind` → render hub.
function paintBodyMind() {
  const root = $('bodymind');
  root.classList.remove('loading');
  root.innerHTML = '';

  const hash = location.hash || '';
  const m = hash.match(/^#bodymind\/(.+)$/);
  const detailId = m ? decodeURIComponent(m[1]) : null;

  if (detailId && bmIndex.byId.has(detailId)) {
    root.appendChild(buildBodyMindDetail(bmIndex.byId.get(detailId)));
    window.scrollTo({ top: 0, behavior: 'instant' });
  } else {
    root.appendChild(buildBodyMindHub());
  }
}

// ---- Hub ----

function buildBodyMindHub() {
  const wrap = el('div', { class: 'bm-hub' });

  wrap.appendChild(el('div', { class: 'bm-hub-intro' },
    el('div', { class: 'bm-hub-title' }, 'Body & Mind'),
    el('div', { class: 'bm-hub-sub' }, 'The biology and practice behind everything I\'m doing. Tap any node to dive in.')
  ));

  wrap.appendChild(buildBodyMindSection('Concepts',   bmData.concepts,  'concept'));
  wrap.appendChild(buildBodyMindSection('Practices',  bmData.practices, 'practice'));
  wrap.appendChild(buildBodyMindSection('Principles', bmData.principles, 'principle'));

  return wrap;
}

function buildBodyMindSection(title, items, kind) {
  const section = el('section', { class: 'bm-section' });
  section.appendChild(el('h3', { class: 'bm-section-head' }, title));

  // Group by category if items have one; otherwise flat.
  const byCat = new Map();
  for (const it of items) {
    const cat = it.category || '';
    if (!byCat.has(cat)) byCat.set(cat, []);
    byCat.get(cat).push(it);
  }

  for (const [cat, group] of byCat) {
    if (cat) section.appendChild(el('div', { class: 'bm-cat-head' }, BM_CATEGORY_LABELS[cat] || cat));
    const grid = el('div', { class: 'bm-card-grid' });
    for (const it of group) grid.appendChild(buildBodyMindCard(it, kind));
    section.appendChild(grid);
  }

  return section;
}

function buildBodyMindCard(item, kind) {
  return el('a', {
    class: `bm-card bm-card-${kind}`,
    href: `#bodymind/${item.id}`,
  },
    el('span', { class: 'bm-card-name' }, item.name),
    item.blurb
      ? el('span', { class: 'bm-card-blurb' }, ' — ' + item.blurb)
      : null,
  );
}

// ---- Detail ----

function buildBodyMindDetail(item) {
  const wrap = el('div', { class: 'bm-detail' });

  wrap.appendChild(el('a', {
    class: 'bm-back',
    href: '#bodymind',
  }, '← Back'));

  wrap.appendChild(el('div', { class: 'bm-detail-kind' },
    item._kind.toUpperCase(),
    item.category ? el('span', { class: 'sep' }, ' · ') : null,
    item.category ? (BM_CATEGORY_LABELS[item.category] || item.category) : null,
  ));
  wrap.appendChild(el('h2', { class: 'bm-detail-title' }, item.name));

  if (item.dose) wrap.appendChild(el('div', { class: 'bm-detail-dose' }, item.dose));
  if (item.blurb) wrap.appendChild(el('p', { class: 'bm-detail-blurb' }, item.blurb));

  // Body — render the structured fields each entity type may carry.
  const body = el('div', { class: 'bm-detail-body' });

  // Practice fields
  appendBodyMindBlock(body, 'How', item.how);
  appendBodyMindBlock(body, 'When', item.when);
  appendBodyMindBlock(body, 'Warnings', item.warnings, 'bad');

  // Concept fields
  appendBodyMindBlock(body, 'Good signaling', item.good_when, 'good');
  appendBodyMindBlock(body, 'Bad signaling', item.bad_when, 'bad');
  appendBodyMindBlock(body, 'Raises (chronic)', item.raises_chronic, 'bad');
  appendBodyMindBlock(body, 'Lowers (chronic)', item.lowers_chronic, 'good');
  appendBodyMindBlock(body, 'Raised by', item.raised_by, 'good');
  appendBodyMindBlock(body, 'Amplified by', item.amplified_by, 'good');
  appendBodyMindBlock(body, 'Starvation signs', item.starvation_signs, 'bad');
  appendBodyMindBlock(body, 'Sleep architecture', item.architecture);
  appendBodyMindBlock(body, 'What helps', item.helpers, 'good');
  appendBodyMindBlock(body, 'What hurts', item.blockers, 'bad');

  // Generic
  appendBodyMindBlock(body, 'Details', item.details);

  wrap.appendChild(body);

  // Relations panels
  const out = bmIndex.edgesFrom.get(item.id) || [];
  const inn = bmIndex.edgesTo.get(item.id) || [];
  if (out.length) wrap.appendChild(buildRelationsPanel('What this affects', out, 'affecting'));
  if (inn.length) wrap.appendChild(buildRelationsPanel('What affects this', inn, 'affected'));

  return wrap;
}

function appendBodyMindBlock(parent, title, value, tone) {
  if (value == null) return;
  if (Array.isArray(value)) {
    if (value.length === 0) return;
    parent.appendChild(el('h4', { class: 'bm-block-head' }, title));
    const ul = el('ul', { class: `bm-list ${tone ? `tone-${tone}` : ''}` });
    for (const v of value) ul.appendChild(el('li', null, v));
    parent.appendChild(ul);
  } else {
    parent.appendChild(el('h4', { class: 'bm-block-head' }, title));
    parent.appendChild(el('p', { class: `bm-para ${tone ? `tone-${tone}` : ''}` }, String(value)));
  }
}

function buildRelationsPanel(title, edges, side) {
  const panel = el('section', { class: 'bm-rels' });
  panel.appendChild(el('h4', { class: 'bm-block-head' }, title));
  const list = el('div', { class: 'bm-rel-list' });

  for (const e of edges) {
    const otherId = side === 'affecting' ? e.to : e.from;
    const other = bmIndex.byId.get(otherId);
    if (!other) continue;
    const verb = (EDGE_LABELS[e.type] || {})[side] || e.type;
    const tone = EDGE_TONE[e.type] || 'neutral';

    const row = el('a', {
      class: `bm-rel tone-${tone}`,
      href: `#bodymind/${otherId}`,
    },
      el('span', { class: 'bm-rel-verb' }, verb),
      el('span', { class: 'bm-rel-name' }, other.name),
      other.blurb
        ? el('span', { class: 'bm-rel-desc' }, ' — ' + other.blurb)
        : null,
      e.scope ? el('span', { class: 'bm-rel-scope' }, e.scope.replace(/_/g, ' ')) : null,
    );
    list.appendChild(row);
  }
  panel.appendChild(list);
  return panel;
}

// ----- Tabs -----
const TABS = ['today', 'plan', 'exercises', 'bodymind', 'setup'];

// Tabs may have sub-routes (e.g. #bodymind/sleep). Use only the segment
// before the first `/` to decide which tab is active.
function tabFromHash() {
  const raw = (location.hash || '#today').slice(1);
  return raw.split('/')[0] || 'today';
}

function activateTab(name, { replaceHash = true } = {}) {
  if (!TABS.includes(name)) name = 'today';
  for (const btn of document.querySelectorAll('#tabs .tab-btn')) {
    const active = btn.dataset.tab === name;
    btn.classList.toggle('active', active);
    btn.setAttribute('aria-selected', active ? 'true' : 'false');
  }
  for (const panel of document.querySelectorAll('main > .tab')) {
    panel.hidden = panel.dataset.tab !== name;
  }
  // Reflect in hash only when asked. Avoid clobbering sub-routes (e.g.
  // hashchange fires for #bodymind/sleep — we shouldn't rewrite to #bodymind).
  if (replaceHash && tabFromHash() !== name) {
    history.replaceState(null, '', `#${name}`);
  }
}

function wireTabs() {
  for (const btn of document.querySelectorAll('#tabs .tab-btn')) {
    btn.addEventListener('click', () => activateTab(btn.dataset.tab));
  }
  window.addEventListener('hashchange', () => {
    activateTab(tabFromHash(), { replaceHash: false });
  });
  activateTab(tabFromHash(), { replaceHash: false });
}

// ----- Boot -----
async function boot() {
  wireTabs();
  try {
    const data = await fetchAll();
    const idx = indexData(data);

    // Header meta
    const newest = data.sessions[0];
    const headerMeta = newest ? `${data.sessions.length} sessions · last ${fmtDateShort(newest.date)}` : 'no data';
    $('header-meta').textContent = headerMeta;

    renderNext(idx);
    renderCharts(idx, data.lifts);
    renderLog(idx);
    renderPlan(idx);
    renderExercises(idx);
    renderBodyMind();
    renderSetup();
  } catch (err) {
    console.error(err);
    const msg = err && err.message ? err.message : String(err);
    for (const id of ['next', 'charts', 'log', 'plan', 'exercises', 'bodymind', 'setup']) {
      const e = $(id);
      if (!e) continue;
      e.classList.remove('loading');
      e.innerHTML = '';
      e.appendChild(el('div', { class: 'error' }, msg));
    }
  }
}

boot();
</script>
